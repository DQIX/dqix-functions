    - name: validateDQ9SaveHeader
      address:
        jpn: 0x20AB164
      description: |-
        Reads and validates the 0x14-byte save header record at backup offset 0x10 for copy 0 or 0x8010 for copy 1.
        Validation checks the record checksum and the save011 identifier. Failure records a copy-specific error state at dynamic base +0x5A68.
        
        r0: destination buffer for the 0x14-byte header record
        r1: nonzero selects copy 1, zero selects copy 0
        returns: 1 when checksum and identifier are valid, otherwise 0
    - name: loadItemPickupTimerSaveBlock
      address:
        jpn: 0x20AB74C
      description: |-
        Restores the 0x194-byte pickup timer save block.
        Byte 0 is copied to dynamic base +0x5A7A as the fldbias selector. The 400 bytes at block +4 are copied to dynamic base +0x5A7C as 100 u32 global timer words.
        For example, block +0x18 is area 5 and block +0x4C is area 18. Their slot-relative save offsets are 0x345C and 0x3490 because the block begins at slot +0x3444.
        
        r0: pointer to the pickup save block beginning at slot-relative 0x3444
        returns: 1
    - name: serializeDQ9SaveBody
      address:
        jpn: 0x20ABB08
      description: |-
        Serializes the DQ9 save body into fixed slot-relative blocks.
        The pickup block is written at 0x3444: selector byte at 0x3444, three alignment bytes, then timer[100] at 0x3448 through 0x35D7.
        It stores a u32 payload checksum at 0x84 covering 0x6F5C bytes from 0x88 through 0x6FE3. Area word offset is 0x3448 + areaIndex*4; examples are area 5 at 0x345C, area 18 at 0x3490, and areas 98/99 at 0x35D0/0x35D4.
        
        r0: save operation state/work object
        r1: caller work/checksum pointer used while fixed destination offsets are materialized
        r2: save option flags
        r3: special-path flag; nonzero serializes the special subset/fields
        returns: 1 on serialization completion
    - name: writeDQ9SaveDualSlot
      address:
        jpn: 0x20AC914
      description: |-
        Asynchronous save writer state machine for the two 0x8000-byte save regions.
        It writes 0x6FE4 bytes of body beginning at backup offset 0x10. With r3=0 it writes the same body to 0x10 and then 0x8010. With r3=1 it writes only to 0x8010.
        Eight inspected callers pass r3=0. overlay_d_02:0216A960 is the inspected special caller and passes r3=1.
        
        r0: save writer state object; byte 0 is the asynchronous stage
        r1: serializer work/checksum pointer
        r2: save option flags
        r3: zero writes both copies; nonzero writes copy 1 only
        returns: 1 when the operation finishes or fails terminally, 0 while pending
    - name: loadDQ9SaveSlot
      address:
        jpn: 0x20ACAEC
      description: |-
        Loads and validates one DQ9 save slot, then restores runtime subsystems from fixed block offsets.
        The pickup block source is slot-relative 0x3444 and is passed to loadItemPickupTimerSaveBlock. A zero slot selector reads the payload/checksum beginning at 0x84; nonzero selects the corresponding copy-1 offsets.
        
        r2: zero selects copy 0, nonzero selects copy 1
        r3: nonzero performs validation without committing all restored runtime state
        returns: true when header, payload checksum, and restore path succeed
