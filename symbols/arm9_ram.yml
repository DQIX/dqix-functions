main:
  versions:
    - jpn
    - eur
    - usa
  address:
    jpn: 0x2000000
    eur: 0x2000000
    usa: 0x2000000
  length:
    jpn: 0xF08000
    eur: 0xF08000
    usa: 0xF08000
  description: |-
    main memory
    
    It lists functions that perform basic processing found in many functions and functions related to random numbers.
  functions:
    - name: abs
      address:
        jpn: 0x20016C0
        eur: 0x20017A4
        usa: 0x20017B0
      description: |-
        Returns the absolute value
        
        r0: fffffff0 etc
        return: absolute value, 10 etc
    - name: memcpy
      address:
        jpn: 0x200195C
      description: |-
        memcpy
        
        r0: to
        r1: from
        r2: length
    - name: advanced_memcpy
      address:
        jpn: 0x200197C
      description: |-
        advanced memcpy
        Negative support
        
        r0: to?
        r1: from?
        r2: length?
    - name: __operator_new
      address:
        jpn: 0x2003C04
      description: |-
        maybe __operator_new
        before updateAT. Found from processturn
        0x0215f3dc
        
        arguments are not yet understood
        return are not yet understood
    - name: UpdateAT
      address:
        jpn: 0x2003C30
        eur: 0x2003D14
        usa: 0x2003D14
      description: |-
        Update 32bit LCG which is AT.
        Many functions mod (divide) this return value to obtain random numbers instead of using the rand function. This is probably a result of function folding due to compile-time optimization.
        
        rand = ((rand * 0x41C64E6D) + 0x3039 & 0xFFFFFFFF)
        
        return: (int) 0x7fff & [32bit rand] >> 0x10
    - name: setAT
      address:
        jpn: 0x2003C64
        eur: 0x2003D48
        usa: 0x2003D48
      description: |-
        Initialize AT with arguments
        Set AT to the specified random value. This is probably used for map generation such as treasure maps
        
        r0: int rand 2f6f6 etc
    - name: strlen
      address:
        jpn: 0x2003E28
      description: |-
        maybe strlen
        
        arguments are not yet understood
        return: (int) structure size
    - name: SafeFastStringCpy
      address:
        jpn: 0x2003E44
      description: |-
        r0: *from
        r1: *to
    - name: strPosDistance
      address:
        jpn: 0x20040A0
      description: |-
        r0: *string
        r1: *hack
        r2: len
    - name: strpos
      address:
        jpn: 0x2004158
      description: |-
        Returns the starting address in r0 that matches the string specified in r1
        
        r0: Unsafe Input string ptr
        r1: Template string ptr
        return: If there is no match, it returns 0, if there is a match it returns the starting address
    - name: Utf8ToInt32
      address:
        jpn: 0x20059B0
      description: |-
        Utf8ToInt32
        
        r0: *string
        return: int32
    - name: Double64Add
      address:
        jpn: 0x200AA44
      description: |-
        Add between Double64 (Binary64) numbers
        
        r0: Left double64 low bit
        r1: Left double64 high bit
        r2: Right double64 low bit
        r3: Right double64 high bit
        ret: (double64) (Left + Right)
        ret r0: double64 low bit
        ret r1: double64 high bit
    - name: Double64ToFloat
      address:
        jpn: 0x200AD5C
      description: |-
        Converts double64 (binary64) to float (Binary32)
        
        r0: double64 low bit
        r1: double64 high bit
        ret: (float) input64
    - name: Double64ToInt1
      address:
        jpn: 0x200AE60
      description: |-
        Converts double64 (binary64) to int (native)
        
        r0: double64 low bit
        r1: double64 high bit
        ret: (int) input64
    - name: Double64ToInt2
      address:
        jpn: 0x200AEAC
      description: |-
        Converts double64 (binary64) to int (native)
        
        r0: double64 low bit
        r1: double64 high bit
        ret: (int) input64
    - name: IntToDouble64
      address:
        jpn: 0x200AF38
      description: |-
        Converts int (native) to double64 (binary64)
        
        r0: Native int
        ret r0: double64 low bit
        ret r1: double64 high bit
        ret: (double64) input
    - name: IntToDouble64
      address:
        jpn: 0x200AF78
      description: |-
        Converts native 32bit (int) to double (Binary64)
        
        r0: input
        ret r0: double64 low bit
        ret r1: double64 high bit
    - name: Double64Multiplication
      address:
        jpn: 0x200AFB4
      description: |-
        Multiplying Double64 numbers
        
        r0: Left double64 low bit
        r1: Left double64 high bit
        r2: Right double64 low bit
        r3: Right double64 high bit
        ret: (double64) (Left * Right)
    - name: Double64Root
      address:
        jpn: 0x200B318
      description: |-
        Root Double64 (Binary64) numbers
        
        r0: double64 low bit
        r1: double64 high bit
        ret: (double64) √(input)
        ret r0: double64 low bit
        ret r1: double64 high bit
    - name: Double64Subtraction
      address:
        jpn: 0x200B4CC
      description: |-
        Subtraction between Double64 (Binary64) numbers
        
        r0: Left double64 low bit
        r1: Left double64 high bit
        r2: Right double64 low bit
        r3: Right double64 high bit
        ret: (double64) (Left - Right)
        ret r0: double64 low bit
        ret r1: double64 high bit
    - name: FloatAdd
      address:
        jpn: 0x200B880
        eur: 0x200B9BC
        usa: 0x200B9BC
      description: |-
        add between IEEE 754 floating-point numbers
        
        r0: IEEE 754 floating-point numbers
        r1: IEEE 754 floating-point numbers
        return: (float) r0 + r1
    - name: Double64GreaterThanOrEqualTo
      address:
        jpn: 0x200BAA4
      description: |-
        Compares binary64 numbers, returns the result as 1 or 0, and sets CPSR at the same time
        
        r0: Left double64 low bit
        r1: Left double64 high bit
        r2: Right double64 low bit
        r3: Right double64 high bit
        ret: (bool) (Left >= Right)
    - name: Double64GreaterThan
