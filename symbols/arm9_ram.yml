    - name: InterpreterForBinaryProgrammingLanguages
      address:
        jpn: 0x2030308
      description: |-
        pam = sp
        {
          pam1 + 0x0: instructions total count
          pam1 + 0x4: instructions data start address
          pam1 + 0x8: instruction override address
          pam1 + 0xc: data original start ptr
          pam1 + 0x10: program length
          pam1 + 0x14: data original start ptr
          pam1 + 0x24: program PC
          pam1 + 0x28: program Node Processed
        }
    - name: alignAfterCeilDivBy4
